<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>haruharu wonder — sales reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --ink-soft: #6b645c;
    --paper: #f6f2ec;
    --card: #fffdfa;
    --line: #e3dbd0;
    --accent: #7c8a5a;       /* sage / botanical green */
    --accent-deep: #5c6843;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(2.5rem, 6vw, 5rem) clamp(1.25rem, 5vw, 2rem) 4rem;
  }

  /* Header */
  header { margin-bottom: clamp(2.5rem, 6vw, 3.5rem); }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-deep);
    font-weight: 600;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: clamp(2.4rem, 8vw, 3.6rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 0.9rem;
  }
  h1 em { font-style: italic; color: var(--accent-deep); }
  .lede {
    font-size: 1.02rem;
    color: var(--ink-soft);
    max-width: 46ch;
  }
  .rule {
    height: 1px;
    background: var(--line);
    margin: clamp(2rem, 5vw, 2.75rem) 0 clamp(1.5rem, 4vw, 2rem);
  }

  /* Section label */
  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 1.25rem;
  }

  /* Report list */
  .reports { list-style: none; display: flex; flex-direction: column; gap: 0.85rem; }
  .report {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 1.15rem 1.35rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
  }
  .report:hover, .report:focus-visible {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px -14px rgba(92,104,67,0.5);
    outline: none;
  }
  .report:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .marker {
    flex: none;
    width: 46px; height: 46px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    display: grid;
    place-items: center;
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 500;
  }
  .report-body { flex: 1; min-width: 0; }
  .report-title {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .report-meta {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-top: 0.15rem;
  }
  .badge {
    flex: none;
    font-size: 0.66rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--accent-deep);
    background: rgba(124,138,90,0.12);
    border-radius: 999px;
    padding: 0.3rem 0.65rem;
  }
  .chev { flex: none; color: var(--ink-soft); transition: transform 0.18s ease; }
  .report:hover .chev { transform: translateX(3px); color: var(--accent-deep); }

  footer {
    margin-top: clamp(3rem, 7vw, 4.5rem);
    font-size: 0.82rem;
    color: var(--ink-soft);
  }
  footer a { color: var(--accent-deep); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Sales Reporting</div>
      <h1>haruharu&nbsp;wonder<br><em>weekly sales</em></h1>
      <p class="lede">Weekly sales performance reports, updated every week. Select a week below to view the full breakdown.</p>
    </header>

    <div class="section-label">Available reports</div>

    <ul class="reports">
      <li>
        <a class="report" href="./June-Wk2.html">
          <span class="marker">W2</span>
          <span class="report-body">
            <span class="report-title">June — Week 2</span>
            <span class="report-meta">Weekly sales report</span>
          </span>
          <span class="badge">Latest</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>
      </li>
    </ul>

    <footer>
      Prepared for haruharu wonder. Questions? Reach out to your account contact.
    </footer>
  </div>
</body>
</html>
